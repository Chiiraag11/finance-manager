spring:
  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

server:
  port: ${PORT:8080}

  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: strict
        name: FINANCE_SESSION
      timeout: 1h

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.financemanager: DEBUG
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: jdbc:h2:mem:prodDb

  jpa:
    hibernate:
      ddl-auto: update

server:
  servlet:
    session:
      cookie:
        secure: true